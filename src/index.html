<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 10 UI | JavaScript Project for FUN</title>
    <script src="./assets/scripts/main.js" defer></script>
    <link rel="stylesheet" type="text/css" href="./assets/styes/main.css">
</head>

<body>
    <main id="main-root">
        <section class="wallpaper-files-folders-section">
            <div class="right-click-menu">
                <p>View</p>
                <p>Sort by</p>
                <p>Refresh</p>
                <p>New Folder</p>
            </div>

        </section>
        <section class="task-view-section">
            <div class="pinned-apps">
                <div class="logo-container"></div>
                <div class="pined-app" id="pined-app1">
                    <img class="pined-app-image" src="./assets/images/icons/console.png" alt="vs-code">
                </div>
                <div class="pined-app" id="pined-app2">
                    <img class="pined-app-image" src="./assets/images/icons/youtube-icon.png" alt="youtube-icon">
                </div>
                <div class="pined-app" id="pined-app3">
                    <img class="pined-app-image" src="./assets/images/icons/vs-code.png" alt="vs-code">
                </div>
                <div class="pined-app" id="pined-app4">
                    <img class="pined-app-image" src="./assets/images/icons/file-exp.png" alt="vs-code">
                </div>
            </div>
            <div class="info">
                <div class="battery"></div>
                <div class="speaker"></div>
                <div class="time-date">
                    <p>12:02 PM</p>
                    <p>16 Mar 2026</p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
